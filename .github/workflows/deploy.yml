name: Deploy to Ubuntu Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nova

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nova/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./ci.db"

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./ci.db"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  deploy:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.APP_DIR || '/var/www/hr-project' }}"
            export BACKUP_ROOT="${{ secrets.BACKUP_ROOT || '/var/backups/hr-project' }}"
            export KEEP_BACKUPS="${{ secrets.KEEP_BACKUPS || '30' }}"
            cd "$APP_DIR"
            bash deploy/deploy.sh
