# HR Project — Coming Soon mode (app stopped)
# Restore: cp /etc/nginx/sites-enabled/hr-project.bak /etc/nginx/sites-enabled/hr-project && nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 103.197.77.33;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 103.197.77.33;

    ssl_certificate /etc/ssl/hr-project/hr-project.crt;
    ssl_certificate_key /etc/ssl/hr-project/hr-project.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25M;

    root /var/www/coming-soon;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
