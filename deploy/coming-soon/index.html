<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova HR — Coming Soon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 50%, #ffffff 100%);
      color: #134e4a;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 480px;
      padding: 3rem 2.5rem;
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.15);
      border: 1px solid #d1fae5;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #10b981, #0d9488);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #064e3b;
    }
    .badge {
      display: inline-block;
      margin-bottom: 1.25rem;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #047857;
      background: #d1fae5;
      border-radius: 9999px;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #4b5563;
      margin-bottom: 0.5rem;
    }
    .sub {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">N</div>
    <span class="badge">Nova HR</span>
    <h1>Coming Soon</h1>
    <p>We are upgrading the platform for a better experience.</p>
    <p>Please check back shortly.</p>
    <p class="sub">Bony Polymers</p>
  </div>
</body>
</html>
